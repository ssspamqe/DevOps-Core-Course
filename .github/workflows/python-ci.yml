name: Python Application CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - 'app_python/**'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'app_python/**'
      - '.github/workflows/python-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        cache-dependency-path: app_python/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f app_python/requirements.txt ]; then pip install -r app_python/requirements.txt; fi

    - name: Lint with flake8
      run: |
        flake8 app_python --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app_python --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      run: |
        # Run tests from the app_python directory to handle relative imports if any
        # or properly point to the test directory and python path
        cd app_python
        pytest --cov=. tests/

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      env:
        VERSION: "1.0.0"
      with:
        context: ./app_python
        push: true
        build-args: |
          VERSION=${{ env.VERSION }}
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/devops-info-service:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/devops-info-service:${{ env.VERSION }}
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/devops-info-service:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/devops-info-service:buildcache,mode=max
