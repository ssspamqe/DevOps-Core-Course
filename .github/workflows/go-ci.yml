name: Go Application CI/CD

on:
  push:
    branches: [ "main", "lab03" ]
    paths:
      - 'app_go/**'
      - '.github/workflows/go-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'app_go/**'
      - '.github/workflows/go-ci.yml'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
        cache-dependency-path: app_go/go.sum

    - name: Run Snyk to check for vulnerabilities
      uses: snyk/actions/golang@master
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      with:
        args: --file=app_go/go.mod

    - name: Build
      run: |
        cd app_go
        go build -v ./...

    - name: Test
      run: |
        cd app_go
        go test -v ./...

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./app_go
        file: ./app_go/Dockerfile.multistage
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/devops-go-app:latest
        cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/devops-go-app:buildcache
        cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/devops-go-app:buildcache,mode=max
