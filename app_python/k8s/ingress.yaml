apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apps-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  tls:
  - hosts:
    - local.example.com
    secretName: tls-secret
  rules:
  - host: local.example.com
    http:
      paths:
      - path: /app1
        pathType: Prefix
        backend:
          service:
            name: app-python
            port:
              number: 8080
      - path: /app2
        pathType: Prefix
        backend:
          service:
            name: app-go
            port:
              number: 8080
