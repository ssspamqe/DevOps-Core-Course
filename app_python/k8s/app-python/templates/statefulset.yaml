{{- if .Values.statefulset.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "common.fullname" . }}
  labels:
    {{- include "common.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "app-python.headlessServiceName" . }}
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: {{ .Values.statefulset.podManagementPolicy }}
  updateStrategy:
    type: {{ .Values.statefulset.updateStrategy.type }}
    {{- if and (eq .Values.statefulset.updateStrategy.type "RollingUpdate") (hasKey .Values.statefulset.updateStrategy "rollingUpdate") }}
    rollingUpdate:
      partition: {{ .Values.statefulset.updateStrategy.rollingUpdate.partition }}
    {{- end }}
  selector:
    matchLabels:
      {{- include "common.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "common.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/config-env: {{ include (print $.Template.BasePath "/configmap-env.yaml") . | sha256sum }}
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "app-python"
        vault.hashicorp.com/agent-inject-secret-config: "secret/data/app-python/config"
        vault.hashicorp.com/agent-inject-template-config: |
          {{`{{- with secret "secret/data/app-python/config" -}}`}}
          APP_USERNAME={{ `{{ .Data.data.username }}` }}
          APP_PASSWORD={{ `{{ .Data.data.password }}` }}
          {{`{{- end -}}`}}
    spec:
      serviceAccountName: {{ include "common.fullname" . }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ include "common.fullname" . }}-config
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          envFrom:
            - secretRef:
                name: {{ include "common.fullname" . }}-secret
            - configMapRef:
                name: {{ include "common.fullname" . }}-env
          env:
            {{- include "common.envVars" . | nindent 12 }}
          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: data-volume
              mountPath: /data
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data-volume
        labels:
          {{- include "common.labels" . | nindent 10 }}
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
{{- end }}