---
# Docker role tasks — install Docker CE on Ubuntu

- name: Docker Installation Block
  block:
    - name: Install required packages for Docker repository
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Create keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: false

    - name: Get architecture
      ansible.builtin.command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false

    - name: Add Docker repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages | default(['docker-ce', 'docker-ce-cli', 'containerd.io', 'docker-buildx-plugin', 'docker-compose-plugin']) }}"
        state: present
        update_cache: yes
      notify: restart docker

  rescue:
    - name: Wait for transient network issues
      ansible.builtin.pause:
        seconds: 10
    - name: Retry updating apt cache
      ansible.builtin.apt:
        update_cache: yes
    - name: Retry installing Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages | default(['docker-ce', 'docker-ce-cli', 'containerd.io', 'docker-buildx-plugin', 'docker-compose-plugin']) }}"
        state: present

  always:
    - name: Ensure Docker service is running and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

  tags:
    - docker
    - docker_install

- name: Docker Configuration Block
  block:
    - name: Add user to docker group
      ansible.builtin.user:
        name: "{{ docker_user | default('ubuntu') }}"
        groups: docker
        append: yes

    - name: Install python3-docker for Ansible docker modules
      ansible.builtin.apt:
        name: python3-docker
        state: present

  tags:
    - docker
    - docker_config
