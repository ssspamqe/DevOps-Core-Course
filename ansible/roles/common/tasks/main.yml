---
# Common role tasks — basic system setup

- name: Packages installation block
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages | default(['git', 'curl', 'wget']) }}"
        state: present

  rescue:
    - name: Fix missing packages
      ansible.builtin.command: apt-get update --fix-missing
      when: ansible_os_family == "Debian"

  always:
    - name: Log package installation attempt
      ansible.builtin.file:
        path: /tmp/common_role_executed
        state: touch
  tags:
    - packages
    - common

- name: User management block
  block:
    - name: Create sudo user
      ansible.builtin.user:
        name: devops
        groups: sudo
        append: yes
        shell: /bin/bash
  tags:
    - users
    - common

- name: System configuration block
  block:
    - name: Set timezone
      community.general.timezone:
        name: "{{ timezone | default('UTC') }}"
  tags:
    - common
